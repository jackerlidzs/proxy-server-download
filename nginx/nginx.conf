worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Extra MIME types for media
    types {
        video/x-matroska mkv;
        video/mp2t ts;
        text/vtt vtt;
        application/x-subrip srt;
    }

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 120;
    keepalive_requests 1000;

    access_log off;
    error_log /var/log/nginx/error.log warn;

    # Large files
    client_max_body_size 0;
    proxy_buffering off;
    output_buffers 4 2m;
    directio 4m;
    aio threads;

    gzip off;

    server {
        listen 80 reuseport;
        server_name _;

        # === Serve Files (inline for text/html, download for binary) ===
        location /files/ {
            alias /downloads/;
            add_header Accept-Ranges bytes always;
            add_header Cache-Control "public, max-age=3600" always;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            output_buffers 4 2m;
            directio 4m;
            aio threads;
            limit_rate 0;
        }

        # === Video Streaming (nginx direct serve - zero copy) ===
        location /stream/ {
            alias /downloads/;
            mp4;
            mp4_buffer_size 1m;
            mp4_max_buffer_size 5m;
            add_header Accept-Ranges bytes always;
            add_header Cache-Control "public, max-age=3600" always;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, If-Range" always;
            add_header Content-Disposition "inline" always;

            # Optimized for streaming large video files
            output_buffers 4 2m;
            directio 4m;
            aio threads;
            limit_rate 0;
            sendfile on;
            tcp_nopush on;
            tcp_nodelay on;

            # Handle CORS preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Range, If-Range" always;
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }
        }

        # === Remuxed Video Streaming (cached MP4 faststart files) ===
        location /stream-remux/ {
            alias /downloads/.remux/;
            mp4;
            mp4_buffer_size 1m;
            mp4_max_buffer_size 5m;
            add_header Accept-Ranges bytes always;
            add_header Cache-Control "public, max-age=3600" always;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, If-Range" always;
            add_header Content-Disposition "inline" always;

            output_buffers 4 2m;
            directio 4m;
            aio threads;
            limit_rate 0;
            sendfile on;
            tcp_nopush on;
            tcp_nodelay on;

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Range, If-Range" always;
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }
        }

        # === HLS Adaptive Streaming ===
        location /hls/ {
            alias /downloads/.hls/;
            add_header Accept-Ranges bytes always;
            add_header Cache-Control "public, max-age=3600" always;
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, If-Range" always;

            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Range, If-Range" always;
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }
        }

        # === API ===
        location /api/ {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_buffering off;
        }

        location /health {
            proxy_pass http://app:8000;
        }

        # === Share Links (public access, no auth) ===
        location /s/ {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        location / {
            proxy_pass http://app:8000;
        }
    }
}
