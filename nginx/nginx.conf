worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Optimize for large file transfers
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Disable gzip for downloads (already compressed files)
    gzip off;

    # Allow large file uploads/downloads
    client_max_body_size 0;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name _;

        # Serve downloaded files
        location /files/ {
            alias /downloads/;

            # Enable range requests for resume support
            add_header Accept-Ranges bytes;

            # Cache control - files are temporary
            add_header Cache-Control "public, max-age=3600";

            # CORS headers for external access
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";

            # Content disposition - force download
            if ($request_filename ~* ^.+\.(rar|zip|7z|tar|gz|bz2|iso|exe|msi|apk|dmg|pkg)$) {
                add_header Content-Disposition "attachment";
            }

            # Optimize for large files
            aio on;
            directio 512k;
            output_buffers 2 1m;
        }

        # Proxy API requests to FastAPI
        location /api/ {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase timeouts for long downloads
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
        }

        # Health check
        location /health {
            proxy_pass http://app:8000;
        }

        # Root - redirect to API docs
        location / {
            proxy_pass http://app:8000;
        }

        # Status page
        location = /status {
            return 302 /docs;
        }
    }
}
